<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contacto — HERA Perfumes & Joyería</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --red:   #E1222B;
    --cream: #F9F9F9;
    --black: #0F0F0F;
    --lgray: #E6E6E6;
    --dgray: #2E2E2E;
    --sans:  'Instrument Sans', sans-serif;
    --serif: 'Cormorant Garamond', serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; overflow-x: clip; }
  body { font-family: var(--sans); background: var(--cream); color: var(--black); overflow-x: clip; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--black); }
  ::-webkit-scrollbar-thumb { background: var(--red); }
  .site-wrap { max-width: 1440px; margin: 0 auto; overflow-x: clip; position: relative; }

  /* NAV */
  nav { position: sticky; top: 0; z-index: 100; background: rgba(249,249,249,.92); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border-bottom: 1px solid rgba(249,249,249,.35); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; height: 64px; width: 100%; box-sizing: border-box; }
  .nav-links { display: flex; gap: 32px; list-style: none; align-items: center; height: 64px; }
  .nav-links li { display: flex; align-items: center; height: 100%; }
  .nav-links a { text-decoration: none; font-size: 12px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--dgray); transition: color .2s; display: flex; align-items: center; height: 100%; }
  .nav-links a:hover, .nav-links a.active { color: var(--red); }
  .nav-logo { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; text-decoration: none; z-index: 101; }
  #logo-placeholder { height: 36px; min-width: 130px; border: 1.5px dashed rgba(15,15,15,.18); display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: rgba(15,15,15,.3); padding: 0 16px; background: var(--cream); }
  .nav-icons { display: flex; gap: 22px; align-items: center; }
  .nav-icons button, .nav-icons a { background: none; border: none; cursor: pointer; color: var(--black); text-decoration: none; transition: color .2s; font-size: 18px; }
  .nav-icons button:hover, .nav-icons a:hover { color: var(--red); }

  /* HERO DE CONTACTO */
  .contact-hero {
    min-height: calc(100vh - 64px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 80px 40px;
    background: var(--black);
  }
  .contact-eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: .22em;
    text-transform: uppercase; color: var(--red);
    display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
  }
  .contact-eyebrow::before, .contact-eyebrow::after {
    content: ''; display: block; width: 36px; height: 2px; background: var(--red);
  }
  .contact-title {
    font-family: var(--sans); font-size: clamp(48px, 7vw, 96px);
    font-weight: 700; letter-spacing: -.02em; line-height: 0.95;
    color: var(--cream); margin-bottom: 16px;
  }
  .contact-title em {
    font-family: var(--serif); font-style: italic;
    font-weight: 300; color: rgba(249,249,249,.35);
  }
  .contact-sub {
    font-family: var(--serif); font-size: 18px; font-style: italic;
    font-weight: 400; color: rgba(249,249,249,.45);
    margin-bottom: 48px; max-width: 480px;
  }
  .contact-badge {
    display: inline-flex; align-items: center; gap: 10px;
    border: 1px solid rgba(249,249,249,.15); padding: 14px 28px;
    font-size: 11px; font-weight: 600; letter-spacing: .16em;
    text-transform: uppercase; color: rgba(249,249,249,.45);
  }
  .contact-badge span { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

  /* FOOTER minimal */
  footer { background: var(--black); padding: 32px 80px; border-top: 1px solid rgba(249,249,249,.06); display: flex; align-items: center; justify-content: space-between; }
  .footer-copy { font-size: 11px; color: rgba(249,249,249,.25); letter-spacing: .08em; }
  .footer-links { display: flex; gap: 24px; }
  .footer-links a { font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: rgba(249,249,249,.3); text-decoration: none; transition: color .2s; }
  .footer-links a:hover { color: var(--red); }

  @media (max-width: 768px) {
    nav { padding: 0 16px; }
    .contact-hero { padding: 60px 24px; }
    footer { padding: 24px 20px; flex-direction: column; gap: 16px; text-align: center; }
  }
</style>
</head>
<body>

<div class="site-wrap">
  <nav>
    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="catalogo.html">Productos</a></li>
      <li><a href="nosotros.html">Nosotros</a></li>
    </ul>
    <a href="index.html" class="nav-logo">
      <div id="logo-placeholder">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2"/><path d="M8 12h8M12 8v8" stroke="currentColor" stroke-width="1.5"/></svg>
        Tu logo aquí
      </div>
    </a>
    <div class="nav-icons">
      <a href="cuenta.html">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/></svg>
      </a>
      <a href="index.html">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </a>
    </div>
  </nav>

  <!-- CONTENIDO -->
  <section class="contact-hero">
    <div class="contact-eyebrow">Contacto</div>
    <h1 class="contact-title">Estamos <em>construyendo</em><br>esta página</h1>
    <p class="contact-sub">Muy pronto podrás escribirnos, encontrarnos y resolver todas tus dudas desde aquí.</p>
    <div class="contact-badge">
      <span></span>
      Próximamente
    </div>
  </section>

  <footer>
    <div class="footer-copy">© 2025 HERA Perfumes & Joyería — Guadalajara, México</div>
    <div class="footer-links">
      <a href="index.html">Inicio</a>
      <a href="catalogo.html">Productos</a>
      <a href="nosotros.html">Nosotros</a>
    </div>
  </footer>

</div>
</body>
</html>
